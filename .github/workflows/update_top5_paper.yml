name: Update Top-5 paper performance

# Top-5 페이퍼 계좌 브로커검증 equity 트랙을 매 거래일 마감 후 갱신.
on:
  workflow_dispatch:
  schedule:
    - cron: "45 22 * * 1-5"   # 마감 후(다른 워크플로와 오프셋)

permissions:
  contents: write
concurrency: {group: portal-data-commit, cancel-in-progress: false}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install alpaca-py yfinance pandas
      - name: Update equity track
        env:
          ALPACA_TOP5_API_KEY:    ${{ secrets.ALPACA_TOP5_API_KEY }}
          ALPACA_TOP5_SECRET_KEY: ${{ secrets.ALPACA_TOP5_SECRET_KEY }}
        run: python scripts/update_top5_paper.py
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add public/data/top5_paper_performance.json
          git diff --cached --quiet || git commit -m "data: top5 paper perf [$(date -u '+%Y-%m-%d')]"
          git push || true
